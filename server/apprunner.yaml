version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm ci --omit=dev
run:
  runtime-version: nodejs22
  command: node index.js
  network:
    port: 3001
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: MONGODB_URI
      value-from: "arn:aws:secretsmanager:us-east-1:979559056307:secret:partner_pulse_app_secrets-COwPRE#MONGODB_URI"
    - name: JWT_SECRET
      value-from: "arn:aws:secretsmanager:us-east-1:979559056307:secret:partner_pulse_app_secrets-COwPRE#JWT_SECRET"
    - name: ALLOWED_ORIGINS
      value-from: "arn:aws:secretsmanager:us-east-1:979559056307:secret:partner_pulse_app_secrets-COwPRE#ALLOWED_ORIGINS"
